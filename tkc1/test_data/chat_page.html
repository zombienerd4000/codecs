<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <style>
    body {
      -webkit-font-smoothing: antialiased;
    }

    html,
    body,
    main,
    #bg-img {
      position: fixed;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      font-family: "UI sans", Arial, Helvetica, sans-serif;
    }

    a {
      color: #4797FF;
      text-decoration: none;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
    }

    #info-box {
      padding: 32px 32px 40px 32px;
      border-radius: 25px;
      background: rgba(35, 35, 38, 0.85);
      box-sizing: border-box;
    }

    #ubiquiti-logo-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    svg#ubiquiti-logo {
      width: 100px;
      height: 100px;
    }

    #message-box {
      width: 414px;
      display: flex;
      flex-direction: column;
      margin-top: 16px;
      gap: 8px;
    }

    #title-text {
      font-size: 28px;
      font-weight: 700;
      line-height: 36px;
      text-align: center;
      color: rgba(255, 255, 255, 0.85);
    }

    #subtitle-text {
      margin-bottom: 8px;
      text-align: center;
    }

    #subtitle-text p {
      margin-bottom: 0;
    }

    #subtitle-text,
    #blocked-type-title,
    #path-wrapper {
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
      color: rgba(255, 255, 255, 0.65);
    }

    #path-wrapper {
      display: flex;
      gap: 4px;
      align-items: center;
      position: relative;
    }

    #path {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #tooltip-container {
      position: relative;
      display: inline-flex;
      justify-content: flex-start;
      align-items: center;
      cursor: pointer;
    }

    #tooltip {
      opacity: 0;
      transition: opacity 0.1s;
      transition-timing-function: cubic-bezier(1, 0, 0.6, 0.8);
      box-shadow: 0 8px 24px 0 rgba(33, 35, 39, 0.08),
        0 0 1px 0 rgba(33, 35, 39, 0.08);
      background-color: #161616;
      border-radius: 4px;
      color: #fafafa;
      font-weight: 400;
      font-size: 16px;
      padding: 8px 16px;
      position: absolute;
      transform: none;
      z-index: 3000;
      cursor: default;
      width: 80px;
      inset: -44px auto auto 2.71875px;
      text-align: center;
      top: 0;
      left: 0;
      transform: translate(-48px, -50px);
    }

    #tooltip::before {
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%) rotate(-135deg);
      background-color: #161616;
      border-top-left-radius: 4px;
      content: "";
      display: block;
      height: 12px;
      position: absolute;
      width: 12px;
      box-shadow: 0 -4px 4px -4px rgba(33, 35, 39, 0.08);
    }

    @media only screen and (max-device-width: 568px) and (-webkit-min-device-pixel-ratio: 2) and (orientation: portrait) {
      #bg-img {
        background-position: -85%;
      }

      #info-box {
        padding: 16px 16px 32px 16px;
        margin: auto 20px;
      }

      svg#ubiquiti-logo {
        width: 80px;
        height: 80px;
      }

      #message-box {
        width: 100%;
        margin-top: 0;
      }

      #title-text {
        font-size: 18px;
      }

      #footer-text {
        width: 160px;
        height: 48px;
        border-radius: 48px;
        font-size: 14px;
        line-height: 20px;
        bottom: 20px;
        transform: translateX(-50%) scale(0.7);
      }

      #path {
        max-width: 294px;
      }
    }

    @media screen and (max-device-height: 568px) and (-webkit-min-device-pixel-ratio: 2) and (orientation: landscape) {
      main {
        align-items: flex-start;
      }

      #info-box {
        padding: 16px 32px;
        margin: 20px auto;
        height: calc(100% - 96px);
      }

      svg#ubiquiti-logo {
        width: 80px;
        height: 80px;
      }

      #message-box {
        width: 600px;
      }

      #title-text {
        font-size: 20px;
      }

      #subtitle-text {
        margin-bottom: 0;
      }

      #footer-text {
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%) scale(0.7);
      }
    }
